<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Widget</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,0" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        :root {
            --primary-custom: {{ bot.config.bot_color|default:'#4F46E5' }};
        }
        .custom-bg-primary { background-color: var(--primary-custom) !important; }
        .custom-text-primary { color: var(--primary-custom) !important; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #CBD5E1; }
    </style>
</head>
<body class="bg-white antialiased flex flex-col h-screen">
    <!-- Header -->
    <div class="p-4 custom-bg-primary text-white flex items-center justify-between shadow-sm">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-full bg-white/20 flex items-center justify-center">
                <span class="material-symbols-outlined text-[20px]">smart_toy</span>
            </div>
            <div>
                <h1 class="text-sm font-bold leading-tight">{{ bot.name }}</h1>
                <p class="text-[10px] opacity-80 uppercase tracking-widest font-bold">Always Active</p>
            </div>
        </div>
        <button onclick="window.parent.postMessage('close-sitebot', '*')" class="opacity-70 hover:opacity-100 transition-opacity">
            <span class="material-symbols-outlined">close</span>
        </button>
    </div>

    <!-- Chat History -->
    <div id="chat-history" class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50/50">
        <!-- Initial Bot Message -->
        <div class="flex items-start gap-3">
            <div class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center custom-text-primary flex-shrink-0">
                <span class="material-symbols-outlined text-[18px]">smart_toy</span>
            </div>
            <div class="max-w-[85%] bg-white border border-slate-100 rounded-2xl rounded-tl-none p-3 shadow-sm">
                <p class="text-[13px] text-slate-700 leading-relaxed">{{ bot.welcome_message|default:"Hi! How can I help you?" }}</p>
            </div>
        </div>
    </div>

    <!-- Input Area -->
    <div class="p-3 border-t border-slate-100 bg-white">
        <div class="flex items-center gap-2 bg-slate-50 rounded-xl px-3 py-1 ring-1 ring-slate-200 focus-within:ring-2 focus-within:ring-indigo-500/20 transition-all">
            {% csrf_token %}
            <input id="chat-input" class="flex-1 bg-transparent border-none focus:ring-0 text-[13px] py-2" placeholder="Ask a question..." type="text">
            <button id="send-button" class="w-8 h-8 custom-bg-primary text-white rounded-lg flex items-center justify-center hover:opacity-90 active:scale-95 transition-all">
                <span class="material-symbols-outlined text-[18px]">send</span>
            </button>
        </div>
        <p class="text-[9px] text-center text-slate-400 mt-2 tracking-wide uppercase font-bold">Powered by SiteBot</p>
    </div>
    <script>
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-button');
        const chatHistory = document.getElementById('chat-history');
        const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;
        const BOT_ID = "{{ bot.id }}";

        // Persistence Logic
        function saveMessage(type, text, isError = false) {
            const history = JSON.parse(localStorage.getItem('sitebot_history_' + BOT_ID) || '[]');
            history.push({ type, text, isError });
            localStorage.setItem('sitebot_history_' + BOT_ID, JSON.stringify(history));
        }

        function loadHistory() {
            const history = JSON.parse(localStorage.getItem('sitebot_history_' + BOT_ID) || '[]');
            history.forEach(msg => {
                if (msg.type === 'user') appendUserMessage(msg.text, false);
                else appendBotMessage(msg.text, msg.isError, false);
            });
        }

        function appendUserMessage(text, shouldSave = true) {
            const div = document.createElement('div');
            div.className = 'flex items-start gap-3 flex-row-reverse';
            div.innerHTML = `
                <div class="w-8 h-8 rounded-full custom-bg-primary flex items-center justify-center text-white shadow-sm flex-shrink-0">
                    <span class="material-symbols-outlined text-[16px]">person</span>
                </div>
                <div class="max-w-[85%] custom-bg-primary text-white rounded-2xl rounded-tr-none p-3 shadow-sm">
                    <p class="text-[13px] leading-relaxed">${text.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</p>
                </div>
            `;
            chatHistory.appendChild(div);
            chatHistory.scrollTop = chatHistory.scrollHeight;
            if (shouldSave) saveMessage('user', text);
        }

        function appendBotMessage(text, isError=false, shouldSave = true) {
            const div = document.createElement('div');
            div.className = 'flex items-start gap-3';
            div.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center ${isError ? 'text-red-500' : 'custom-text-primary'} flex-shrink-0">
                    <span class="material-symbols-outlined text-[18px]">${isError ? 'warning' : 'smart_toy'}</span>
                </div>
                <div class="max-w-[85%] bg-white border border-slate-100 rounded-2xl rounded-tl-none p-3 shadow-sm">
                    <p class="text-[13px] text-slate-700 leading-relaxed">${text.replace(/\\n/g, '<br>')}</p>
                </div>
            `;
            chatHistory.appendChild(div);
            chatHistory.scrollTop = chatHistory.scrollHeight;
            if (shouldSave) saveMessage('bot', text, isError);
        }

        async function sendMessage() {
            const msg = chatInput.value.trim();
            if (!msg) return;
            chatInput.value = '';
            appendUserMessage(msg);

            try {
                const response = await fetch("{% url 'bot_chat_api' bot.id %}", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
                    body: JSON.stringify({ message: msg })
                });
                const data = await response.json();
                appendBotMessage(data.answer || data.error, !response.ok);
            } catch (e) {
                appendBotMessage("Connection error.", true);
            }
        }

        sendBtn.onclick = sendMessage;
        chatInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };

        // Initialize
        loadHistory();
    </script>
</body>
</html>
