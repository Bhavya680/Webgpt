<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create New Bot - SiteBot AI</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-tertiary-container": "#ffd2be",
              "primary-fixed": "#e2dfff",
              "tertiary": "#7e3000",
              "surface": "#f9f9ff",
              "on-error-container": "#93000a",
              "surface-bright": "#f9f9ff",
              "outline": "#777587",
              "primary": "#3525cd",
              "on-background": "#141b2b",
              "outline-variant": "#c7c4d8",
              "tertiary-container": "#a44100",
              "surface-tint": "#4d44e3",
              "on-secondary-fixed-variant": "#413f82",
              "on-secondary-container": "#454386",
              "tertiary-fixed": "#ffdbcc",
              "secondary-fixed-dim": "#c3c0ff",
              "primary-fixed-dim": "#c3c0ff",
              "surface-container-high": "#e1e8fd",
              "on-error": "#ffffff",
              "on-primary-container": "#dad7ff",
              "surface-variant": "#dce2f7",
              "surface-container-lowest": "#ffffff",
              "on-surface-variant": "#464555",
              "on-primary": "#ffffff",
              "on-primary-fixed": "#0f0069",
              "surface-container-highest": "#dce2f7",
              "on-tertiary-fixed-variant": "#7b2f00",
              "secondary": "#58579b",
              "background": "#f9f9ff",
              "inverse-surface": "#293040",
              "on-tertiary-fixed": "#351000",
              "secondary-fixed": "#e2dfff",
              "surface-container-low": "#f1f3ff",
              "on-secondary-fixed": "#140f54",
              "on-tertiary": "#ffffff",
              "on-surface": "#141b2b",
              "on-primary-fixed-variant": "#3323cc",
              "tertiary-fixed-dim": "#ffb695",
              "on-secondary": "#ffffff",
              "surface-container": "#e9edff",
              "inverse-on-surface": "#edf0ff",
              "primary-container": "#4f46e5",
              "error": "#ba1a1a",
              "secondary-container": "#b6b4ff",
              "surface-dim": "#d3daef",
              "error-container": "#ffdad6",
              "inverse-primary": "#c3c0ff"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen">
<!-- Background Dashboard (Screen 15 Reference) -->
<div class="fixed inset-0 overflow-hidden pointer-events-none select-none opacity-40 blur-[2px]">
<!-- TopNavBar Simulation -->
<header class="bg-white/80 backdrop-blur-xl shadow-sm fixed top-0 w-full z-10 flex justify-between items-center px-8 h-16">
<div class="flex items-center gap-8">
<span class="text-xl font-black text-indigo-700 tracking-tighter">SiteBot</span>
<nav class="hidden md:flex gap-6">
<span class="text-indigo-700 border-b-2 border-indigo-600 font-bold">Dashboard</span>
<span class="text-slate-500 font-medium">Analytics</span>
<span class="text-slate-500 font-medium">Settings</span>
</nav>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-slate-500">notifications</span>
<div class="w-8 h-8 rounded-full bg-slate-200"></div>
</div>
</header>
<!-- SideNavBar Simulation -->
<aside class="h-screen w-64 fixed left-0 top-0 bg-slate-900 flex flex-col py-6 px-4 pt-20">
<div class="space-y-2">
<div class="flex items-center gap-3 px-4 py-3 bg-indigo-600/10 text-indigo-400 border-r-4 border-indigo-500">
<span class="material-symbols-outlined">dashboard</span>
<span class="text-label-md tracking-widest uppercase font-bold text-xs">Home</span>
</div>
<div class="flex items-center gap-3 px-4 py-3 text-slate-400">
<span class="material-symbols-outlined">smart_toy</span>
<span class="text-label-md tracking-widest uppercase font-bold text-xs">Chatbots</span>
</div>
</div>
</aside>
<!-- Content Simulation -->
<main class="ml-64 pt-24 px-10">
<div class="grid grid-cols-12 gap-6">
<div class="col-span-12 h-64 bg-surface-container-low rounded-xl"></div>
<div class="col-span-4 h-48 bg-surface-container-low rounded-xl"></div>
<div class="col-span-4 h-48 bg-surface-container-low rounded-xl"></div>
<div class="col-span-4 h-48 bg-surface-container-low rounded-xl"></div>
</div>
</main>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-on-background/50 p-4 backdrop-blur-sm">
<!-- Modal Container -->
<div class="bg-surface-container-lowest w-full max-w-[520px] rounded-2xl shadow-[0_25px_50px_rgba(20,27,43,0.25)] p-8 relative animate-in fade-in zoom-in duration-300">
<!-- Close Button -->
<button class="absolute top-6 right-6 text-outline hover:text-on-surface transition-colors">
<span class="material-symbols-outlined text-[24px]">close</span>
</button>
<!-- Modal Header -->
<div class="mb-8">
<h2 class="text-[24px] font-bold text-on-background tracking-tight">Create New Chatbot</h2>
<p class="text-on-surface-variant text-sm mt-1">Configure your AI assistant in minutes.</p>
</div>
<!-- Form Elements -->
<form class="space-y-6">
<!-- Bot Name -->
<div class="space-y-1.5">
<label class="block text-label-md font-bold tracking-wider uppercase text-on-surface-variant text-[11px]">Bot Name</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant/15 rounded-lg py-3 px-4 text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary/20 focus:border-primary/50 transition-all outline-none" placeholder="Acme Support Bot" type="text"/>
</div>
<!-- Website URL -->
<div class="space-y-1.5">
<label class="block text-label-md font-bold tracking-wider uppercase text-on-surface-variant text-[11px]">Website URL</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant/15 rounded-lg py-3 px-4 text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary/20 focus:border-primary/50 transition-all outline-none" placeholder="https://acme.com" type="url"/>
<p class="text-[13px] text-outline mt-1 flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]">info</span>
            We'll crawl this website to train your chatbot
          </p>
</div>
<!-- Welcome Message -->
<div class="space-y-1.5">
<label class="block text-label-md font-bold tracking-wider uppercase text-on-surface-variant text-[11px]">Welcome Message (optional)</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant/15 rounded-lg py-3 px-4 text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary/20 focus:border-primary/50 transition-all outline-none" placeholder="Hi! How can I help you today?" type="text"/>
</div>
<!-- Bot Color -->
<div class="space-y-3">
<label class="block text-label-md font-bold tracking-wider uppercase text-on-surface-variant text-[11px]">Bot Color</label>
<div class="flex items-center gap-3">
<button class="w-8 h-8 rounded-full bg-[#3b82f6] border-2 border-white ring-2 ring-primary ring-offset-0 transition-transform hover:scale-110 active:scale-95 shadow-sm" type="button"></button>
<button class="w-8 h-8 rounded-full bg-[#a855f7] border-2 border-white transition-transform hover:scale-110 active:scale-95 shadow-sm" type="button"></button>
<button class="w-8 h-8 rounded-full bg-[#ef4444] border-2 border-white transition-transform hover:scale-110 active:scale-95 shadow-sm" type="button"></button>
<button class="w-8 h-8 rounded-full bg-[#22c55e] border-2 border-white transition-transform hover:scale-110 active:scale-95 shadow-sm" type="button"></button>
<button class="w-8 h-8 rounded-full bg-[#f97316] border-2 border-white transition-transform hover:scale-110 active:scale-95 shadow-sm" type="button"></button>
<button class="w-8 h-8 rounded-full bg-[#111827] border-2 border-white transition-transform hover:scale-110 active:scale-95 shadow-sm" type="button"></button>
<button class="ml-2 text-primary font-bold text-sm hover:underline" type="button">Custom</button>
</div>
</div>
<!-- Footer Actions -->
<div class="flex items-center justify-end gap-3 mt-10 pt-4">
<button class="px-6 py-3 rounded-lg font-bold text-on-surface-variant bg-surface-container-high hover:bg-surface-variant transition-colors" type="button">
            Cancel
          </button>
<button class="px-6 py-3 rounded-lg font-bold text-on-primary bg-primary-container hover:bg-primary shadow-lg shadow-primary/20 transition-all flex items-center gap-2" type="submit">
            Create &amp; Train Bot
            <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</div>
</form>
</div>
</div>
<!-- Decorative Context Glow -->
<div class="fixed -bottom-48 -left-48 w-96 h-96 bg-primary-fixed rounded-full blur-[100px] opacity-20 pointer-events-none"></div>
<div class="fixed -top-48 -right-48 w-96 h-96 bg-primary-fixed rounded-full blur-[100px] opacity-20 pointer-events-none"></div>
</body></html>
